<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      background: linear-gradient(135deg, #ff4b5c, #000000, #00008B);  
      color: #fff;
    }
    h1, h2 { color: #f1f1f1; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #1a1a1a; color: #fff; }
    table, th, td { border: 1px solid #444; }
    th, td { padding: 10px; text-align: left; }
    th { background-color: #333; }
    button { padding: 6px 12px; margin: 2px; cursor: pointer; border: none; border-radius: 4px; }
    .btn-delete { background: #e74c3c; color: #fff; }
    .btn-edit { background: #3498db; color: #fff; }
    .btn-add { background: #2ecc71; color: #fff; margin-bottom: 10px; }
    form { display: flex; flex-direction: column; max-width: 400px; margin-top: 15px; background: #1a1a1a; padding: 15px; border-radius: 6px; }
    form input, form textarea { margin-bottom: 10px; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #333; color: #fff; }
    form button { align-self: flex-start; }
    #formSection { display: none; border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 6px; background: #222; }
    img { border-radius: 4px; }
    .logout-btn {
      background: #f39c12;
      color: #fff;
      padding: 8px 14px;
      border-radius: 5px;
      float: right;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>

 <h1>
  <a href="index.html" style="text-decoration:none; color:#fff; margin-right:15px;">
     &#8592; HOME
  </a>
  Admin Panel 
  <button class="logout-btn" onclick="logout()">Logout</button>
</h1>


  <!-- CONTACTS SECTION -->
  <h2>Contact Messages</h2>
  <table id="contactTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="contactTableBody"></tbody>
  </table>

  <!-- GALLERY SECTION -->
  <h2>Gallery Management</h2>
  <button class="btn-add" onclick="showForm()">+ Add New Sketch</button>

  <!-- Form -->
  <div id="formSection">
    <h3 id="formTitle">Add Sketch</h3>
    <form id="sketchForm">
      <input type="hidden" id="sketchId">
      <input type="text" id="title" placeholder="Title" required>
      <textarea id="description" placeholder="Description" required></textarea>
      <input type="text" id="imageUrl" placeholder="Image URL" required>
      <button type="submit">Save</button>
    </form>
  </div>

  <!-- Table -->
  <table id="sketchTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Image</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // =========================
    // ROLE-BASED ACCESS CONTROL
    // =========================
    document.addEventListener("DOMContentLoaded", () => {
      const role = sessionStorage.getItem("role");
      const username = sessionStorage.getItem("username");
      const isLoggedIn = sessionStorage.getItem("isLoggedIn");

      if (!isLoggedIn || role !== "ADMIN") {
        alert("❌ Access denied! Only admins can access this page.");
        window.location.href = "login.html";
        return;
      }

      console.log("✅ Admin verified:", username);
      loadContacts();
      loadSketches();
    });

    function logout() {
      sessionStorage.clear();
      window.location.href = "login.html";
    }

    // =========================
    // CONTACTS MANAGEMENT
    // =========================
    const CONTACT_API = "http://localhost:8080/api/contact/all";
    const DELETE_CONTACT_API = "http://localhost:8080/api/contact/delete/";

    async function loadContacts() {
      try {
        const res = await fetch(CONTACT_API);
        const contacts = await res.json();
        const tbody = document.getElementById("contactTableBody");
        tbody.innerHTML = "";

        contacts.forEach(c => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.message}</td>
            <td><button class="btn-delete" onclick="deleteContact(${c.id})">Delete</button></td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error("Error loading contacts:", err);
      }
    }

    async function deleteContact(id) {
      if (!confirm("Are you sure you want to delete this contact?")) return;
      try {
        const res = await fetch(DELETE_CONTACT_API + id, { method: "DELETE" });
        if (res.ok) {
          alert("✅ Contact deleted!");
          loadContacts();
        } else {
          alert("❌ Failed to delete contact");
        }
      } catch (err) {
        console.error("Delete error:", err);
      }
    }

    // =========================
    // GALLERY MANAGEMENT
    // =========================
    const SKETCH_API = "http://localhost:8080/api/sketches";
    const sketchTable = document.querySelector("#sketchTable tbody");
    const formSection = document.getElementById("formSection");
    const formTitle = document.getElementById("formTitle");
    const sketchForm = document.getElementById("sketchForm");

    const sketchIdInput = document.getElementById("sketchId");
    const titleInput = document.getElementById("title");
    const descInput = document.getElementById("description");
    const imageUrlInput = document.getElementById("imageUrl");

    async function loadSketches() {
      try {
        const res = await fetch(SKETCH_API);
        const sketches = await res.json();

        sketchTable.innerHTML = "";
        sketches.forEach(sketch => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${sketch.id}</td>
            <td>${sketch.title}</td>
            <td>${sketch.description}</td>
            <td><img src="${sketch.imageUrl}" width="80"></td>
            <td>
              <button class="btn-edit" onclick="editSketch(${sketch.id})">Edit</button>
              <button class="btn-delete" onclick="deleteSketch(${sketch.id})">Delete</button>
            </td>
          `;
          sketchTable.appendChild(row);
        });
      } catch (err) {
        console.error("Error loading sketches:", err);
      }
    }

    function showForm() {
      formSection.style.display = "block";
      formTitle.innerText = "Add Sketch";
      sketchForm.reset();
      sketchIdInput.value = "";
    }

    async function editSketch(id) {
      const res = await fetch(`${SKETCH_API}/${id}`);
      const sketch = await res.json();

      sketchIdInput.value = sketch.id;
      titleInput.value = sketch.title;
      descInput.value = sketch.description;
      imageUrlInput.value = sketch.imageUrl;

      formTitle.innerText = "Edit Sketch";
      formSection.style.display = "block";
    }

    async function deleteSketch(id) {
      if (!confirm("Delete this sketch?")) return;
      await fetch(`${SKETCH_API}/${id}`, { method: "DELETE" });
      alert("✅ Sketch deleted!");
      loadSketches();
    }

    sketchForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const sketchData = {
        title: titleInput.value,
        description: descInput.value,
        imageUrl: imageUrlInput.value
      };

      if (sketchIdInput.value) {
        await fetch(`${SKETCH_API}/${sketchIdInput.value}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(sketchData)
        });
        alert("✅ Sketch updated successfully!");
      } else {
        await fetch(SKETCH_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(sketchData)
        });
        alert("✅ Sketch added successfully!");
      }

      formSection.style.display = "none";
      sketchForm.reset();
      loadSketches();
    });
  </script>
</body>
</html>
